<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Update progress</title>
<style>
  body { font-family: system-ui, sans-serif; background: #111827; color: #f3f4f6; margin: 0; padding: 24px; }
  h1 { font-size: 1.1rem; margin: 0 0 16px; }
  label { display: block; font-size: 0.85rem; margin: 12px 0 4px; color: #9ca3af; }
  input, select { width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #374151; background: #1f2937; color: #f3f4f6; }
  button { margin-top: 18px; width: 100%; padding: 10px; border-radius: 6px; border: none; background: #22c55e; color: #052e16; font-weight: 700; cursor: pointer; }
  .msg { font-size: 0.85rem; margin-top: 10px; min-height: 1em; }
  .msg.error { color: #fca5a5; }
  .msg.success { color: #86efac; }
</style>
</head>
<body>
  <h1>Update your task / progress</h1>
  <label for="task">Task / work description</label>
  <input id="task" type="text" maxlength="255" placeholder="e.g. Working on attendance dashboard API">

  <label for="status">Progress status</label>
  <select id="status">
    <option value="not_started">Not Started</option>
    <option value="in_progress">In Progress</option>
    <option value="blocked">Blocked</option>
    <option value="completed">Completed</option>
  </select>

  <label for="percent">Progress (%)</label>
  <input id="percent" type="number" min="0" max="100" placeholder="0-100">

  <label for="remarks">Remarks (optional)</label>
  <input id="remarks" type="text" maxlength="500">

  <button id="saveBtn">Save</button>
  <div class="msg" id="msg"></div>

<script>
  const msg = document.getElementById('msg');

  async function loadExisting() {
    const result = await window.attendanceTray.getProgress();
    if (result.ok && result.data.progress) {
      const p = result.data.progress;
      document.getElementById('task').value = p.task_description || '';
      document.getElementById('status').value = p.progress_status || 'not_started';
      document.getElementById('percent').value = p.progress_percent ?? '';
      document.getElementById('remarks').value = p.remarks || '';
    }
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const percentRaw = document.getElementById('percent').value;
    const payload = {
      task_description: document.getElementById('task').value.trim(),
      progress_status: document.getElementById('status').value,
      remarks: document.getElementById('remarks').value.trim(),
    };
    if (percentRaw !== '') payload.progress_percent = parseInt(percentRaw, 10);

    const result = await window.attendanceTray.submitProgress(payload);
    msg.className = 'msg ' + (result.ok ? 'success' : 'error');
    msg.textContent = result.ok ? 'Saved.' : (result.data && result.data.error) || 'Could not save.';
  });

  loadExisting();
</script>
</body>
</html>
