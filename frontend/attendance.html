<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhimo Tracker - Desktop App Required</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            padding: 20px;
        }

        .orb {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: var(--accent);
            filter: blur(140px);
            opacity: 0.12;
            pointer-events: none;
        }

        .orb-1 {
            top: 10%;
            left: 20%;
        }

        .orb-2 {
            bottom: 10%;
            right: 20%;
            background: #a855f7;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: var(--accent);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .icon {
            font-size: 2.2rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .shortcut-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 0.88rem;
            color: var(--text-primary);
            font-weight: 500;
            margin-top: 8px;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="icon-container">
                <div class="icon">&#128187;</div>
            </div>
            <h1>Use Desktop App to Track Session</h1>
            <p>Web-based attendance tracking has been retired. Please use the <span class="highlight">Abhimo Tracker</span> application in your system tray to Sign In and Sign Out of your shift.</p>
            
            <div class="shortcut-badge">
                Right-click the icon in your Windows Taskbar system tray to begin.
            </div>
        </div>
    </div>
</body>

</html>
